[tool.poetry]
name = "aptos-sdk"
version = "0.12.0"
description = "Aptos SDK for Python - Interact with the Aptos blockchain"
authors = ["Aptos Labs <opensource@aptoslabs.com>"]
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/aptos-labs/aptos-python-sdk"
homepage = "https://aptos.dev/en/build/sdks/python-sdk"
keywords = ["web3", "sdk", "aptos", "blockchain", "cryptocurrency", "move"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[tool.setuptools.package-data]
"aptos-sdk" = ["py.typed"]

[tool.poetry.dependencies]
python = ">=3.9.0"
ecdsa = "0.19.1"
python-graphql-client = "^0.4.3"
httpx = {extras = ["http2"], version = "^0.28.0"}
PyNaCl = "^1.5.0"
tomli = "^2.2.1"
typing-extensions = "^4.15.0"
cachetools = "^5.3.0"
# Dev/testing dependencies (also needed for behave tests in CI)
behave = "^1.2.6"
types-six = "^1.17.0.20250515"
h11 = "^0.16.0"
multidict = "^6.6.4"
# These below are to fix security vulnerabilities in dependencies
h2 = "^4.3.0"
urllib3 = "^2.5.0"
requests = "^2.32.5"
aiohttp = "^3.12.14"

[tool.poetry.group.dev.dependencies]
autoflake = "^2.3.1"
black = "^24.10.0"
coverage = "^7.6.12"
flake8 = "^7.2.0"
isort = "^5.13.2"
mypy = "^1.16.0"
mypy-extensions = "^1.1.0"
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
pytest-httpx = "^0.22.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

# =============================================================================
# Pytest Configuration
# =============================================================================
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = "-v --tb=short"
markers = [
    "integration: mark test as integration test (requires network)",
    "slow: mark test as slow running",
]

# =============================================================================
# Coverage Configuration
# =============================================================================
[tool.coverage.run]
source = ["aptos_sdk"]
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/conftest.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
show_missing = true

# =============================================================================
# Black Configuration
# =============================================================================
[tool.black]
line-length = 88
target-version = ["py39", "py310", "py311", "py312"]

# =============================================================================
# isort Configuration
# =============================================================================
[tool.isort]
profile = "black"
line_length = 88

# =============================================================================
# mypy Configuration
# =============================================================================
[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
