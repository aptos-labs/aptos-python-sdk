[tool.poetry]
name = "aptos-sdk"
version = "0.12.0"
description = "Aptos Python SDK — async-first SDK for the Aptos blockchain"
authors = ["Aptos Labs <opensource@aptoslabs.com>"]
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/aptos-labs/aptos-python-sdk"
homepage = "https://aptos.dev/en/build/sdks/python-sdk"
keywords = ["web3", "sdk", "aptos", "blockchain"]

[tool.setuptools.package-data]
"aptos-sdk" = ["py.typed"]

[tool.poetry.dependencies]
python = ">=3.10.0"
httpx = {extras = ["http2"], version = "^0.28.0"}
PyNaCl = "^1.5.0"
ecdsa = "^0.19.0"
typing-extensions = "^4.15.0"
mnemonic = {version = "^0.21", optional = true}

[tool.poetry.extras]
mnemonic = ["mnemonic"]

[tool.poetry.group.dev.dependencies]
autoflake = "^2.3.1"
black = "^24.10.0"
coverage = "^7.6.12"
flake8 = "^7.2.0"
isort = "^5.13.2"
mypy = "^1.16.0"
mypy-extensions = "^1.1.0"
pytest = "^8.0"
pytest-asyncio = "^0.24"
mnemonic = "^0.21"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.isort]
profile = "black"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
